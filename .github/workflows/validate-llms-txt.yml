name: Validate llms.txt

on:
  pull_request:
    paths:
      - "llms.txt"
      - "*.html"
      - ".github/workflows/validate-llms-txt.yml"

jobs:
  validate:
    name: Validate llms.txt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check llms.txt exists
        run: |
          if [ ! -f llms.txt ]; then
            echo "::error::llms.txt not found in repository root"
            exit 1
          fi

      - name: Validate structure
        run: |
          errors=0

          # Must start with an H1
          if ! head -1 llms.txt | grep -qE '^# .+'; then
            echo "::error file=llms.txt,line=1::llms.txt must start with an H1 header (# Site Name)"
            errors=$((errors + 1))
          fi

          # Must have a blockquote summary
          if ! grep -qE '^> .+' llms.txt; then
            echo "::error file=llms.txt::llms.txt must include a blockquote (> ...) summary"
            errors=$((errors + 1))
          fi

          # Must have a Pages section
          if ! grep -qE '^## Pages' llms.txt; then
            echo "::error file=llms.txt::llms.txt must include a '## Pages' section"
            errors=$((errors + 1))
          fi

          # Every public HTML file should be referenced — by either its .html
          # page or its .md mirror (llms.txt links to the Markdown mirrors).
          for html_file in *.html; do
            [ "$html_file" = "*.html" ] && continue
            [ "$html_file" = "discovery.html" ] && continue  # unlisted intake form (noindex)
            stem="${html_file%.html}"
            if grep -qE "(^|/)${stem}\.(md|html)([\")# ]|$)" llms.txt; then
              continue
            fi
            echo "::warning file=llms.txt::$html_file (or ${stem}.md) is not referenced in llms.txt — consider adding it"
            errors=$((errors + 1))
          done

          # Must not be empty or trivially small (< 5 lines)
          line_count=$(wc -l < llms.txt)
          if [ "$line_count" -lt 5 ]; then
            echo "::error file=llms.txt::llms.txt has only $line_count lines — too sparse to be useful"
            errors=$((errors + 1))
          fi

          if [ "$errors" -gt 0 ]; then
            echo "::error::llms.txt validation found $errors issue(s)"
            exit 1
          fi

          echo "llms.txt structure is valid"

      - name: Verify referenced URLs resolve to repo files
        run: |
          # Serve the repo locally and probe each referenced URL against the
          # repo's own files. This validates the links pre-merge (new pages and
          # .md mirrors aren't live yet) instead of hitting the production site.
          python3 -m http.server 8080 --directory . &
          server_pid=$!
          sleep 2
          urls=$(grep -oE 'https://eagleridge\.io[^)]*' llms.txt | sort -u)
          errors=0

          for url in $urls; do
            # Map the production URL to a local path; drop the domain and fragment.
            path=$(echo "$url" | sed -E 's#https://eagleridge\.io##; s/#.*//')
            [ -z "$path" ] && path="/"
            status=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "http://localhost:8080$path" || echo "000")
            if [ "$status" -ne 200 ]; then
              echo "::error file=llms.txt::$url -> local path '$path' returned HTTP $status"
              errors=$((errors + 1))
            else
              echo "OK: $url ($status)"
            fi
          done

          kill "$server_pid" 2>/dev/null || true

          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors referenced URL(s) do not resolve to files in the repo"
            exit 1
          fi

          echo "All referenced URLs resolve to repo files"

  drift-check:
    name: Check llms.txt freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Warn if HTML changed without llms.txt update
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          html_changed=$(git diff --name-only "$base" "$head" -- '*.html' | wc -l)
          llms_changed=$(git diff --name-only "$base" "$head" -- 'llms.txt' | wc -l)

          if [ "$html_changed" -gt 0 ] && [ "$llms_changed" -eq 0 ]; then
            echo "::warning::HTML files were modified but llms.txt was not updated. Please review whether llms.txt needs changes to stay in sync."
            # Intentionally not failing — this is advisory
          else
            echo "No drift detected"
          fi
